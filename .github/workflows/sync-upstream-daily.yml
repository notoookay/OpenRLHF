name: Sync upstream daily

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync main with upstream
        id: sync
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/OpenRLHF/OpenRLHF.git
          else
            git remote add upstream https://github.com/OpenRLHF/OpenRLHF.git
          fi
          git fetch upstream main
          git fetch origin main

          if git merge-base --is-ancestor origin/main upstream/main; then
            git checkout -B main origin/main
            git merge --ff-only upstream/main
            git push origin main
            echo "needs_review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          review_branch="upstream-sync-review"
          if git ls-remote --exit-code --heads origin "$review_branch" >/dev/null 2>&1; then
            git fetch origin "$review_branch:refs/remotes/origin/$review_branch"
          fi
          git checkout -B "$review_branch" upstream/main
          if git show-ref --verify --quiet "refs/remotes/origin/$review_branch"; then
            remote_sha="$(git rev-parse refs/remotes/origin/$review_branch)"
            [ -n "$remote_sha" ]
            lease_ref="refs/heads/upstream-sync-review:${remote_sha}"
            git push --force-with-lease="$lease_ref" origin "$review_branch"
          else
            git push --force-with-lease="refs/heads/${review_branch}:" origin "$review_branch"
          fi

          echo "Fast-forward sync failed because origin/main has diverged from upstream/main."
          echo "Created/updated branch '$review_branch' for manual review."
          echo "needs_review=true" >> "$GITHUB_OUTPUT"
          echo "review_branch=$review_branch" >> "$GITHUB_OUTPUT"

      - name: Open manual review PR when branches diverge
        if: steps.sync.outputs.needs_review == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.sync.outputs.review_branch }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              base: 'main',
            });

            if (existing.length > 0) {
              core.info(`Manual review PR already exists: #${existing[0].number}`);
              return;
            }

            const { data: created } = await github.rest.pulls.create({
              owner,
              repo,
              title: 'Manual review required: upstream sync conflict',
              head: branch,
              base: 'main',
              body: [
                'Automatic fast-forward sync from `OpenRLHF/OpenRLHF` failed because `main` has diverged.',
                '',
                'Please review and merge this PR manually to resolve conflicts.',
              ].join('\n'),
            });

            core.info(`Created manual review PR: #${created.number}`);
