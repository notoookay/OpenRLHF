name: Sync upstream daily

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync main with upstream
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/OpenRLHF/OpenRLHF.git || true
          git fetch upstream main
          git fetch origin main
          git checkout -B main origin/main
          if ! git merge --ff-only upstream/main; then
            echo "Fast-forward sync failed because origin/main has diverged from upstream/main."
            echo "Please resolve divergence manually."
            exit 1
          fi
          git push origin main
